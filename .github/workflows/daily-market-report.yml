name: Daily Market Dashboard

on:
  schedule:
    - cron: "30 13 * * *"   # 9:30 PM Singapore time
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate dashboard
        run: python main.py

      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html
          git commit -m "Update market dashboard" || echo "No changes to commit"
          git push
