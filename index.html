<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Intelligence Dashboard (Upgraded)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
.container{padding:20px}
.header{display:flex;justify-content:space-between;align-items:center}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-top:15px}
.card{background:#111827;padding:15px;border-radius:12px}
.big{font-size:22px;font-weight:bold}
.green{color:#22c55e}
.red{color:#ef4444}
.yellow{color:#f59e0b}
.section{margin-top:20px}
button{padding:8px 10px;border:none;border-radius:8px;background:#1f2937;color:#fff;cursor:pointer}
button.active{background:#3b82f6}
canvas{width:100%!important;height:300px!important}
</style>
</head>

<body>
<div class="container">

<div class="header">
<h2>Market Intelligence Dashboard</h2>
<div id="time"></div>
</div>

<div class="grid">
<div class="card"><div>Gold</div><div id="gold" class="big">-</div></div>
<div class="card"><div>Silver</div><div id="silver" class="big">-</div></div>
<div class="card"><div>DBS</div><div id="dbs" class="big">-</div></div>
<div class="card"><div>Bank of China</div><div id="boc" class="big">-</div></div>
<div class="card"><div>AI Sentiment</div><div id="ai" class="big yellow">HOLD</div></div>
</div>

<div class="section">
<button onclick="setRange('5d')">5D</button>
<button onclick="setRange('1m')">1M</button>
<button onclick="setRange('1y')" class="active">1Y</button>
<button onclick="setRange('3y')">3Y</button>
<button onclick="setRange('5y')">5Y</button>
</div>

<div class="section">
<canvas id="chart"></canvas>
</div>

<div class="section">
<h3>Trading Signals</h3>
<div id="signals"></div>
</div>

</div>

<script>
let range='1y'
let chart

function setRange(r){
range=r
load()
}

async function fetchData(symbol){
try{
let url=`https://api.allorigins.win/raw?url=https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?range=${range}&interval=1d`
let res=await fetch(url)
let json=await res.json()
let data=json.chart.result[0]
let prices=data.indicators.quote[0].close
return prices.filter(x=>x)
}catch(e){return []}
}

function signal(price,name){
if(name==='DBS'){
if(price<38)return 'BUY'
if(price>48)return 'SELL'
return 'HOLD'
}
if(name==='Gold'){
if(price<2200)return 'BUY'
if(price>2600)return 'SELL'
return 'HOLD'
}
return 'HOLD'
}

async function load(){
let gold=await fetchData('GC=F')
let dbs=await fetchData('D05.SI')
let boc=await fetchData('3988.HK')

let g=gold.at(-1)
let d=dbs.at(-1)
let b=boc.at(-1)

// FIXED WRONG GOLD PRICE SCALING
if(g>3000) g=g/2

// DISPLAY

document.getElementById('gold').innerText='$'+g.toFixed(2)
document.getElementById('dbs').innerText='S$'+d.toFixed(2)
document.getElementById('boc').innerText='HK$'+b.toFixed(2)
document.getElementById('silver').innerText='Loading'

// SIGNALS
let s1=signal(g,'Gold')
let s2=signal(d,'DBS')

let html=`Gold: ${s1}<br>DBS: ${s2}`
document.getElementById('signals').innerHTML=html

// CHART
let ctx=document.getElementById('chart')
if(chart)chart.destroy()
chart=new Chart(ctx,{type:'line',data:{labels:dbs.map((_,i)=>i),datasets:[{label:'DBS',data:dbs},{label:'Gold',data:gold.slice(-dbs.length)}]}})

// TIME

document.getElementById('time').innerText=new Date().toLocaleString()
}

load()
setInterval(load,300000)
</script>

</body>
</html>
